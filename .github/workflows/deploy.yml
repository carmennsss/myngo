name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Desplegar en EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            # Variables de entorno desde GitHub Secrets
            export TOLGEE_API_KEY="${{ secrets.TOLGEE_API_KEY }}"
            export TOLGEE_PROJECT_ID="${{ secrets.TOLGEE_PROJECT_ID }}"
            export TOLGEE_API_URL="http://127.0.0.1:8085"

            # Autenticar Tolgee CLI (una sola vez por despliegue)
            tolgee auth --apiKey "$TOLGEE_API_KEY"
            tolgee config:set projectId "$TOLGEE_PROJECT_ID"
            tolgee config:set apiUrl "$TOLGEE_API_URL"

            # Tu deploy actual
            cd /home/ubuntu/myngo
            git fetch origin
            git reset --hard origin/main
            cd backend/myngo_api
            source venv/bin/activate
            pip install -r requirements.txt
            python manage.py migrate --noinput
            python manage.py collectstatic --noinput
            sudo systemctl restart daphne

            # Ejecutar tu script de sincronización
            cd /home/ubuntu/myngo
            chmod +x ./sync_translations.sh
            ./sync_translations.sh