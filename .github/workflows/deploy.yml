name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Dependencies
        run: |
          cd backend/myngo_api
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Backend Tests
        run: |
          cd backend/myngo_api
          pytest --cov=. --cov-report=xml

  deploy:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Desplegar en EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            # Instalar Node.js si no está presente (necesario para npx)
            if ! command -v node &> /dev/null; then
              curl -fsSL https://deb.nodesource.com/setup_18.x | sudo -E bash -
              sudo apt install -y nodejs
            fi

            # Variables de entorno para Tolgee
            export TOLGEE_API_KEY="${{ secrets.TOLGEE_API_KEY }}"
            export TOLGEE_API_URL="http://127.0.0.1:8085"
            # Si tu proyecto Tolgee necesita projectId (opcional si usas sólo push/pull)
            export TOLGEE_PROJECT_ID="${{ secrets.TOLGEE_PROJECT_ID }}"

            # Actualizar código del backend (frontend no está aquí)
            cd /home/ubuntu/myngo
            git fetch origin
            git reset --hard origin/main

            # Backend Django
            cd backend/myngo_api
            source venv/bin/activate
            pip install -r requirements.txt
            python manage.py migrate --noinput
            python manage.py collectstatic --noinput
            sudo systemctl restart daphne

            # Sincronizar traducciones (solo backend)
            cd /home/ubuntu/myngo
            chmod +x ./sync_translations.sh
            # Normalmente después del deploy quieres traer las últimas traducciones:
            ./sync_translations.sh pull
            # Si en cambio subes cambios desde el backend (raro en CI), usar push